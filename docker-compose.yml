

services:
  db:
    image: mysql:8.4.2
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: teste123
    volumes:
      - db_data:/var/lib/mysql
  app:
    image: node:20.11.0
    ports:
      - 8081:8081
    environment:
      MYSQL_HOST: db
    working_dir: /app
    volumes:
      - ./:/app
    #command: "npm i --legacy-peer-deps && npm run dev"
    #command: "npm run dev"
    command: >
      sh -c "npm i --legacy-peer-deps &&
             npm run dev"

volumes:
  db_data: